# Keycloak — IdP for dev (Docker/Podman compatible)
# Port: 8080 (admin console). Uses dev mode with embedded DB (no Postgres required for local dev).

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ignition-keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=localhost
      - KC_HTTP_ENABLED=true
    command: start-dev
    ports:
      - "8080:8080"
    restart: unless-stopped
